name: soul-context-injector
version: "5.5.0"
description: |
  任务等级体系 + 工作流本地检测 + 技能绑定 + 智能分析（L0-L4）
  
  v5.5.0 更新：
  - 新增工作流本地检测（精确匹配，不调用 Ollama）
  - 工作流任务跳过规则注入，直接注入执行指令
  - 删除确认词硬编码检测，改为统一由 analyze_task 判断
  - L4 判断后才授予执行认证
author: OpenClaw Team

# 插件类型
type: context

# 依赖
requires:
  - httpx
  - pyyaml

# Hook 注册
hooks:
  - pre_llm_call    # LLM 调用前注入上下文
  - pre_tool_call   # 工具调用前拦截危险命令
  - post_tool_call  # 工具调用后清理

# 配置选项
config:
  ollama_url:
    type: string
    default: "http://localhost:11434/api/generate"
    description: Ollama API 地址
  
  ollama_model:
    type: string
    default: "qwen2.5:7b"
    description: 使用的 Ollama 模型
  
  timeout_ms:
    type: integer
    default: 15000
    description: Ollama 调用超时时间（毫秒）
  
  fallback_mode:
    type: string
    default: "local"
    description: Ollama 不可用时的降级模式（local/skip）
  
  workflow_cache_ttl:
    type: integer
    default: 300
    description: 工作流触发词缓存时间（秒）
