name: soul-context-injector
version: "5.9.1"
description: |
  任务等级体系 + 工作流精确匹配 + 技能提醒（L0-L4）

  v5.9.0 更新：
  - 移除不可靠的 session 追踪机制
  - 改为轻量级规则注入 + 工具提醒
  - 技能推荐非强制，由上下文引导
  - 保留破坏性命令拦截
author: OpenClaw Team

# 插件类型
type: context

# 依赖
requires:
  - httpx
  - pyyaml
  - requests  # analyzer.py Ollama API 调用

# Hook 注册
hooks:
  - pre_llm_call    # LLM 调用前注入上下文
  - pre_tool_call   # 工具调用前拦截危险命令
  - post_tool_call  # 工具调用后清理

# 配置选项
config:
  ollama_url:
    type: string
    default: "http://localhost:11434/api/generate"
    description: Ollama API 地址
  
  ollama_model:
    type: string
    default: "qwen2.5:7b"
    description: 使用的 Ollama 模型
  
  timeout_ms:
    type: integer
    default: 15000
    description: Ollama 调用超时时间（毫秒）
  
  fallback_mode:
    type: string
    default: "local"
    description: Ollama 不可用时的降级模式（local/skip）
  
  workflow_cache_ttl:
    type: integer
    default: 300
    description: 工作流触发词缓存时间（秒）
