name: soul-context-injector
version: "5.6.0"
description: |
  任务等级体系 + 工作流本地检测 + 技能绑定 + 智能分析（L0-L4）

  v5.6.0 更新：
  - 工作流强制执行模式：增强 build_workflow_directive() 注入强制约束
  - 验证清单机制：输出前必须完成技能调用验证
  - enforcer 支持 W 等级：技能追踪 + 输出拦截
  - 禁止行为明确化：跳过步骤、未调用技能、使用历史数据
  - 修复关键返回格式错误：所有拦截层现在正常工作
author: OpenClaw Team

# 插件类型
type: context

# 依赖
requires:
  - httpx
  - pyyaml
  - requests  # analyzer.py Ollama API 调用

# Hook 注册
hooks:
  - pre_llm_call    # LLM 调用前注入上下文
  - pre_tool_call   # 工具调用前拦截危险命令
  - post_tool_call  # 工具调用后清理

# 配置选项
config:
  ollama_url:
    type: string
    default: "http://localhost:11434/api/generate"
    description: Ollama API 地址
  
  ollama_model:
    type: string
    default: "qwen2.5:7b"
    description: 使用的 Ollama 模型
  
  timeout_ms:
    type: integer
    default: 15000
    description: Ollama 调用超时时间（毫秒）
  
  fallback_mode:
    type: string
    default: "local"
    description: Ollama 不可用时的降级模式（local/skip）
  
  workflow_cache_ttl:
    type: integer
    default: 300
    description: 工作流触发词缓存时间（秒）
