name: soul-context-injector
version: "5.8.0"
description: |
  任务等级体系 + 工作流精确匹配 + 技能绑定 + 智能分析（L0-L4）

  v5.8.0 更新：
  - 移除写入操作拦截（原 Layer 3）
  - 理由：用户意图 "只拦截不使用技能 不需要拦截写入等操作"
  - 技能强制在输出时执行（OUTPUT_TOOLS 检查）
  - 修复：LLM 可以先调用技能，再执行写入，不会被提前拦截
author: OpenClaw Team

# 插件类型
type: context

# 依赖
requires:
  - httpx
  - pyyaml
  - requests  # analyzer.py Ollama API 调用

# Hook 注册
hooks:
  - pre_llm_call    # LLM 调用前注入上下文
  - pre_tool_call   # 工具调用前拦截危险命令
  - post_tool_call  # 工具调用后清理

# 配置选项
config:
  ollama_url:
    type: string
    default: "http://localhost:11434/api/generate"
    description: Ollama API 地址
  
  ollama_model:
    type: string
    default: "qwen2.5:7b"
    description: 使用的 Ollama 模型
  
  timeout_ms:
    type: integer
    default: 15000
    description: Ollama 调用超时时间（毫秒）
  
  fallback_mode:
    type: string
    default: "local"
    description: Ollama 不可用时的降级模式（local/skip）
  
  workflow_cache_ttl:
    type: integer
    default: 300
    description: 工作流触发词缓存时间（秒）
